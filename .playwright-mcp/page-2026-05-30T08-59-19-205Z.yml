        - heading "# signature 生成" [level=4] [ref=e358]:
          - link "#" [ref=e359] [cursor=pointer]:
            - /url: "#signature-生成"
          - text: signature 生成
        - list [ref=e360]:
          - listitem [ref=e361]:
            - paragraph [ref=e362]: 获取 baseString，步骤如下：
            - list [ref=e363]:
              - listitem [ref=e364]: 将所有请求参数（不包含 signature）按参数名进行升序排序
              - listitem [ref=e365]: 对每个参数的键和值分别进行 URL 编码
              - listitem [ref=e366]: 按照 "编码后的键=编码后的值&" 的格式拼接所有参数
              - listitem [ref=e367]: 移除最后一个多余的 "&" 符号，得到 baseString
            - code [ref=e370]: "示例: accessKeyId=XXX&appId=XXX&lang=cn&utc=2025-03-24T00%3A01%3A19%2B0800&uuid=edf53e32-6533-4d6a-acd3-fe4df14ee332"
          - listitem [ref=e371]:
            - paragraph [ref=e372]: 以 accessKeySecret 为密钥，对 baseString 进行 HmacSHA1 加密，得到二进制字节数组
          - listitem [ref=e373]:
            - paragraph [ref=e374]: 对 HmacSHA1 加密后的字节数组进行 Base64 编码，得到最终的 signature
            - code [ref=e377]: "示例: IrrzsJeOFk1NGfJHW6SkHUoN9CU="
        - heading "# 2.2 实时通信阶段" [level=3] [ref=e378]:
          - link "#" [ref=e379] [cursor=pointer]:
            - /url: "#_2-2-实时通信阶段"
          - text: 2.2 实时通信阶段
        - paragraph [ref=e380]: 握手成功后，进入实时通信阶段，客户端主动操作有两种：上传数据和上传结束标识，被动操作有两种：接收转写结果和错误。
        - list [ref=e381]:
          - listitem [ref=e382]:
            - strong [ref=e383]: 上传数据
            - text: ：实时转写过程中，客户端不断构造 binary message 发送到服务端，内容是音频的二进制数据。建议音频流每 40ms 发送 1280 字节，发送过快可能导致引擎出错；音频发送间隔超时时间为 15 秒，超时服务端报错并主动断开连接。
          - listitem [ref=e384]:
            - strong [ref=e385]: 上传结束标志
            - text: ：音频数据上传完成后，客户端需发送一个结束标识，并且制定会话sessionId：
            - code [ref=e388]: "{\"end\": true, \"sessionId\": \"d49ddd6f-c451-35ea-b8c4-2c75af837caa\"}"
